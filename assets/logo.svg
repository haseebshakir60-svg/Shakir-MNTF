<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="40%" r="60%">
      <stop offset="0%"  stop-color="#1e2d4f"/>
      <stop offset="100%" stop-color="#0a0e1a"/>
    </radialGradient>
    <linearGradient id="ringGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#2d6aff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0.5"/>
    </linearGradient>
    <linearGradient id="ringGrad2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"  stop-color="#7c3aed" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#2d6aff" stop-opacity="0.4"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="128" cy="128" r="124" fill="url(#bgGrad)"/>
  <circle cx="128" cy="128" r="122" fill="none" stroke="#2d6aff" stroke-width="3" opacity="0.6"/>

  <!-- Orbital ring 1 -->
  <ellipse cx="128" cy="128" rx="96" ry="34"
           fill="none" stroke="url(#ringGrad1)" stroke-width="2"
           transform="rotate(-35 128 128)" opacity="0.75"/>

  <!-- Orbital ring 2 -->
  <ellipse cx="128" cy="128" rx="96" ry="34"
           fill="none" stroke="url(#ringGrad2)" stroke-width="2"
           transform="rotate(35 128 128)" opacity="0.75"/>

  <!-- Orbital ring 3 (near-vertical) -->
  <ellipse cx="128" cy="128" rx="96" ry="34"
           fill="none" stroke="#00d4ff" stroke-width="1.5"
           transform="rotate(90 128 128)" opacity="0.45"/>

  <!-- Electron dots -->
  <circle cx="224" cy="128" r="5" fill="#00d4ff" filter="url(#glow)" opacity="0.9"/>
  <circle cx="54"  cy="80"  r="4" fill="#2d6aff" filter="url(#glow)" opacity="0.9"/>
  <circle cx="54"  cy="176" r="4" fill="#7c3aed" filter="url(#glow)" opacity="0.9"/>

  <!-- Centre nucleus -->
  <circle cx="128" cy="128" r="10" fill="#00d4ff" opacity="0.25"/>
  <circle cx="128" cy="128" r="5"  fill="#ffffff" filter="url(#glow)"/>

  <!-- "S" initial -->
  <text x="128" y="116"
        font-family="'Segoe UI', Arial, sans-serif"
        font-size="56" font-weight="900"
        fill="white" text-anchor="middle" dominant-baseline="middle"
        filter="url(#glow)" opacity="0.95">S</text>

  <!-- "MNTF" subtitle -->
  <text x="128" y="164"
        font-family="'Segoe UI', Arial, sans-serif"
        font-size="24" font-weight="700"
        fill="#00d4ff" text-anchor="middle" dominant-baseline="middle"
        letter-spacing="5">MNTF</text>
</svg>
